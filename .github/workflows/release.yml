name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    name: Build & Release APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "17" }
      - uses: gradle/actions/setup-gradle@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build release APK
        run: ./gradlew :app:assembleRelease --no-daemon

      - name: Rename APK
        run: mv app/build/outputs/apk/release/app-release-unsigned.apk hyacine-music-${{ steps.version.outputs.VERSION }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "风堇音乐 v${{ steps.version.outputs.VERSION }}"
          generate_release_notes: true
          files: hyacine-music-${{ steps.version.outputs.VERSION }}.apk