name: Android Release APK

on:
  workflow_dispatch:
    inputs:
      backend_api_url:
        description: "Backend API URL / 后端 API 地址，例如 http://192.168.1.100:3000/api/v1"
        required: false
        default: "http://192.168.1.100:3000/api/v1"
        type: string
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

permissions:
  contents: read

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-release-apk:
    name: Build standalone Android Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/local/lib/android/sdk/emulator
          sudo rm -rf /usr/local/lib/android/sdk/system-images
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          docker image prune --all --force
          df -h

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false
          # 未指定 version，将自动读取 package.json 中的 packageManager 字段

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install JavaScript dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate TypeScript
        run: pnpm typecheck

      - name: Generate Android native project
        env:
          # 在 prebuild 阶段注入环境变量，使地址被硬编码到原生代码中
          EXPO_PUBLIC_API_URL: ${{ inputs.backend_api_url || 'http://192.168.1.100:3000/api/v1' }}
        run: pnpm exec expo prebuild --platform android --non-interactive --no-install

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle build cache
        uses: gradle/actions/setup-gradle@v4

      - name: Build standalone arm64-v8a release APK

        working-directory: android
        run: |
          ./gradlew assembleRelease --no-daemon --stacktrace \
            -Dorg.gradle.caching=true \
            -PreactNativeArchitectures=arm64-v8a \
            -x lintVitalRelease

      - name: Upload standalone release APK
        uses: actions/upload-artifact@v4
        with:
          name: hyacine-music-release-apk-arm64
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
          retention-days: 14