name: Android Debug APK

on:
  workflow_dispatch:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

permissions:
  contents: read

concurrency:
  group: android-debug-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-debug-apk:
    name: Build Android Development APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # setup-node's pnpm cache invokes pnpm, so pnpm must be available first.
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.13.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Install JavaScript dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate TypeScript
        run: pnpm typecheck

      - name: Generate Android native project
        run: pnpm exec expo prebuild --platform android --non-interactive --no-install

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: hyacine-music-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14
